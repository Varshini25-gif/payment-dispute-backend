name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: payment_dispute_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d payment_dispute_db_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/payment_dispute_db_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      ENVIRONMENT: test
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: 8000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short -m "unit" \
            --cov=app --cov-report=xml --cov-report=term-missing \
            --junitxml=reports/junit-unit.xml || true

      - name: Run API tests
        run: |
          pytest tests/api/ -v --tb=short -m "api" \
            --junitxml=reports/junit-api.xml || true

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short -m "integration" \
            --junitxml=reports/junit-integration.xml || true

      - name: Run full test suite
        run: |
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing \
            --junitxml=reports/junit-full.xml \
            --ignore=tests/integration

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: reports/coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: reports/
          retention-days: 7

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: payment-dispute-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
